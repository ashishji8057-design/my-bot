<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>muBOT — AI Chat Interface</title>
  <meta name="description" content="A sleek, modern AI chatbot powered by Groq API — muBOT delivers lightning-fast, intelligent conversations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particle-canvas"></canvas>
  </div>

  <!-- App Shell -->
  <div class="app-shell">

    <!-- Sidebar Backdrop for Mobile -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="16" cy="16" r="14" fill="url(#grad1)"/>
              <path d="M10 16c0-3.314 2.686-6 6-6s6 2.686 6 6-2.686 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <circle cx="16" cy="16" r="2.5" fill="#fff"/>
              <defs>
                <linearGradient id="grad1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#7c3aed"/>
                  <stop offset="1" stop-color="#06b6d4"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="brand-name">muBOT</span>
        </div>
        <button class="icon-btn" id="new-chat-btn" title="New Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>



      <!-- Model Selector -->
      <div class="model-section">
        <label class="api-label">Model</label>
        <div class="model-select-wrap">
          <select id="model-select">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile</option>
            <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
            <option value="gemma2-9b-it">Gemma 2 9B</option>
            <option value="llama3-70b-8192">Llama 3 70B</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- Chat History -->
      <div class="history-section">
        <span class="history-label">Recent Chats</span>
        <ul class="history-list" id="history-list">
          <!-- Dynamically populated -->
        </ul>
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <div class="user-badge interactive-hover">
          <div class="user-avatar">
            <img src="assets/ashish.jpg" alt="Ashish Sharma" id="sidebar-profile-img" />
          </div>
          <div class="user-info">
            <span class="user-name">Ashish Sharma</span>
            <span class="user-sub">Local Session</span>
          </div>
        </div>
        <button class="icon-btn theme-btn" id="theme-btn" title="Toggle Theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">

      <!-- Top Bar -->
      <header class="chat-header">
        <button class="icon-btn hamburger" id="hamburger-btn" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-info">
          <h1 class="chat-title" id="chat-title">New Conversation</h1>
          <span class="model-badge" id="model-badge">Llama 3.3 70B</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="clear-btn" title="Clear Chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
          <button class="icon-btn" id="export-btn" title="Export Chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </header>

      <!-- Messages Container -->
      <div class="messages-container" id="messages-container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-logo">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
              <circle cx="32" cy="32" r="30" fill="url(#wgrad)"/>
              <path d="M20 32c0-6.627 5.373-12 12-12s12 5.373 12 12-5.373 12-12 12" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
              <circle cx="32" cy="32" r="5" fill="#fff"/>
              <defs>
                <linearGradient id="wgrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#7c3aed"/>
                  <stop offset="1" stop-color="#06b6d4"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="welcome-pulse"></div>
          </div>
          <h2 class="welcome-title">Hello, I'm <span class="gradient-text">muBOT</span></h2>
          <p class="welcome-sub">Powered by Groq's ultra-fast LLM inference. Ask me anything.</p>
          <div class="suggestion-grid" id="suggestion-grid">
            <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
              <div class="suggestion-icon">⚛️</div>
              <span>Explain quantum computing</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a Python function to reverse a linked list">
              <div class="suggestion-icon">🐍</div>
              <span>Python: Reverse linked list</span>
            </button>
            <button class="suggestion-card" data-prompt="What are the best practices for REST API design?">
              <div class="suggestion-icon">🔗</div>
              <span>REST API best practices</span>
            </button>
            <button class="suggestion-card" data-prompt="Give me 5 creative startup ideas for 2025">
              <div class="suggestion-icon">🚀</div>
              <span>5 startup ideas for 2025</span>
            </button>
          </div>
        </div>

        <!-- Messages will be injected here -->
        <div class="messages-list" id="messages-list"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper" id="input-wrapper">
          <button class="attach-btn icon-btn" id="attach-btn" title="Attach file (coming soon)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea
            id="chat-input"
            placeholder="Message muBOT…"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <div class="input-actions">
            <span class="char-count" id="char-count">0</span>
            <button class="send-btn" id="send-btn" title="Send Message" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <p class="input-hint">muBOT can make mistakes. Consider checking important information.</p>
      </div>

    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Loading overlay for full response -->
  <div class="thinking-overlay" id="thinking-overlay" style="display:none">
    <div class="thinking-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Created By Badge -->
  <a href="#" class="created-by-badge interactive-hover" title="Developer">
    <div class="creator-avatar">
      <img src="assets/ashish.jpg" alt="Ashish Sharma" />
    </div>
    <div class="creator-text">
      <span>Created by</span>
      <strong>Ashish Sharma</strong>
    </div>
  </a>

  <script src="app.js"></script>
</body>
</html>
